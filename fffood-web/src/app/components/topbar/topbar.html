<header class="topbar" style="height:56px; background:var(--card); border-bottom:1px solid var(--rule); display:flex; align-items:center; padding:0 20px; gap:16px; flex-shrink:0;">

  <!-- Left: date + screen title -->
  <div style="display:flex; flex-direction:column; justify-content:center; min-width:0;">
    <div style="font-size:11px; color:var(--ink-3); line-height:1.2;" class="topbar-date">{{ dateString }}</div>
    <div style="font-size:14px; font-weight:600; color:var(--ink); line-height:1.2;">{{ screenLabel }}</div>
  </div>

  <!-- Center: stock alert chips (hidden on mobile) -->
  <div class="topbar-alerts" style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px;">
    <span *ngIf="lowStock > 0" class="chip chip-warn" style="cursor:default;">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19H3.5L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>
      {{ lowStock }} low stock
    </span>
    <span *ngIf="outStock > 0" class="chip chip-terra" style="cursor:default;">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      {{ outStock }} sold out
    </span>
    <span *ngIf="lowStock === 0 && outStock === 0" style="font-size:12px; color:var(--ink-3);" class="topbar-ok">All stock levels nominal</span>
  </div>

  <!-- Right: time + terminal + user -->
  <div style="display:flex; align-items:center; gap:14px; flex-shrink:0;">
    <!-- Time + Terminal -->
    <div style="text-align:right;">
      <div class="tabular" style="font-size:16px; font-weight:700; color:var(--ink); line-height:1.2;">{{ timeString }}</div>
      <div style="font-size:10px; color:var(--ink-3); letter-spacing:1px; text-transform:uppercase; line-height:1.2;" class="topbar-terminal">Terminal 01</div>
    </div>

    <!-- User (hide name/role on small screens) -->
    <div *ngIf="user" style="display:flex; align-items:center; gap:8px;">
      <div [style.background]="user.color" style="width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0;">
        {{ user.initials }}
      </div>
      <div class="topbar-user-text">
        <div style="font-size:13px; font-weight:600; color:var(--ink); line-height:1.2;">{{ user.name }}</div>
        <div style="font-size:11px; color:var(--ink-3); line-height:1.2;">{{ user.role }}</div>
      </div>
    </div>
  </div>

</header>
