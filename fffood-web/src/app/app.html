<app-login *ngIf="!user" (loggedIn)="onLogin($event)"></app-login>

<div *ngIf="user" class="shell">
  <app-sidebar
    [activeScreen]="activeScreen"
    [user]="user"
    (screenChange)="onScreenChange($event)"
    (logout)="onLogout()">
  </app-sidebar>
  <div class="main">
    <app-topbar
      [user]="user"
      [screen]="activeScreen"
      [lowStock]="lowStock"
      [outStock]="outStock">
    </app-topbar>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Mobile Bottom Navigation (visible only on ≤767px via CSS) -->
<nav class="bottom-nav" *ngIf="user">
  <button (click)="onScreenChange('pos')" [class.active]="activeScreen==='pos'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
      <line x1="3" y1="6" x2="21" y2="6"/>
      <path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    <span>POS</span>
  </button>
  <button (click)="onScreenChange('menu')" [class.active]="activeScreen==='menu'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
    </svg>
    <span>Menu</span>
  </button>
  <button (click)="onScreenChange('inventory')" [class.active]="activeScreen==='inventory'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2.97 12.92A2 2 0 002 14.63v3.24a2 2 0 001.17 1.82l4.82 2.49a2 2 0 001.94 0l4.82-2.49a2 2 0 001.17-1.82v-3.24a2 2 0 00-.97-1.71l-4.82-2.49a2 2 0 00-1.94 0z"/>
      <path d="M10 22V16.97"/>
    </svg>
    <span>Stock</span>
  </button>
  <button (click)="onLogout()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span>Out</span>
  </button>
</nav>
