<div class="login-shell" style="display:grid; grid-template-columns:480px 1fr; height:100vh; overflow:hidden;">

  <!-- ── Left Panel ── -->
  <div class="login-brand" style="background:var(--ink); display:flex; flex-direction:column; justify-content:space-between; padding:48px 40px; position:relative; overflow:hidden;">
    <!-- gradient overlay -->
    <div style="position:absolute; inset:0; background:linear-gradient(135deg, rgba(196,85,60,0.25) 0%, transparent 60%); pointer-events:none;"></div>

    <!-- Logo block -->
    <div style="position:relative; z-index:1;">
      <div style="font-size:48px; font-weight:700; color:#fff; font-family:Georgia,serif; line-height:1; letter-spacing:-2px; margin-bottom:24px;">ƒ</div>
      <div style="font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.4); text-transform:uppercase; margin-bottom:16px;">FFFood POS</div>
      <h1 class="serif" style="font-size:34px; font-weight:400; color:#fff; line-height:1.25; letter-spacing:-0.5px;">Good day,<br>bienvenue.</h1>
    </div>

    <!-- Footer -->
    <div style="position:relative; z-index:1;">
      <div style="height:1px; background:rgba(255,255,255,0.1); margin-bottom:20px;"></div>
      <div style="font-size:11px; color:rgba(255,255,255,0.3); font-family:var(--mono); display:flex; flex-direction:column; gap:4px;">
        <div>{{ dateString }}</div>
        <div>TERMINAL 01 &nbsp;·&nbsp; {{ timeString }}</div>
        <div>v2.4.1 FFFood Systems</div>
      </div>
    </div>
  </div>

  <!-- ── Right Panel ── -->
  <div class="login-form-wrap" style="background:var(--paper); display:flex; align-items:center; justify-content:center; overflow:hidden;">

    <!-- Staff Selection View -->
    <div *ngIf="!selectedStaff" class="animate-in" style="width:100%; max-width:520px; padding:40px;">
      <h2 style="font-size:22px; font-weight:600; color:var(--ink); margin-bottom:6px;">Who's on today?</h2>
      <p style="font-size:14px; color:var(--ink-3); margin-bottom:8px;">Select your profile to clock in.</p>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <button
          *ngFor="let s of staff"
          (click)="selectStaff(s)"
          style="display:flex; flex-direction:column; align-items:center; gap:14px; padding:28px 20px; background:var(--card); border:1.5px solid var(--rule); border-radius:16px; cursor:pointer; transition:all 150ms ease; text-align:center;"
          onmouseenter="this.style.borderColor='#827a68'; this.style.boxShadow='0 4px 20px rgba(26,24,20,0.12)'"
          onmouseleave="this.style.borderColor='var(--rule)'; this.style.boxShadow='none'"
        >
          <div [style.background]="s.color" style="width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#fff; letter-spacing:-0.5px; flex-shrink:0;">
            {{ s.initials }}
          </div>
          <div>
            <div style="font-size:15px; font-weight:600; color:var(--ink); margin-bottom:3px;">{{ s.name }}</div>
            <div style="font-size:12px; color:var(--ink-3);">{{ s.role }}</div>
          </div>
        </button>
      </div>
    </div>

    <!-- PIN Entry View -->
    <div *ngIf="selectedStaff" class="animate-slide" style="width:100%; max-width:360px; padding:40px; display:flex; flex-direction:column; align-items:center;">

      <!-- Back -->
      <button (click)="goBack()" class="btn btn-ghost" style="align-self:flex-start; margin-bottom:32px; gap:6px; padding:6px 10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5m7-7-7 7 7 7"/></svg>
        Back
      </button>

      <!-- Avatar + Name -->
      <div [style.background]="selectedStaff.color" style="width:72px; height:72px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; color:#fff; margin-bottom:12px;">
        {{ selectedStaff.initials }}
      </div>
      <div style="font-size:18px; font-weight:600; color:var(--ink); margin-bottom:4px;">{{ selectedStaff.name }}</div>
      <div style="font-size:13px; color:var(--ink-3); margin-bottom:32px;">{{ selectedStaff.role }}</div>

      <!-- PIN Dots -->
      <div [class.shake]="errorShake" style="display:flex; gap:12px; margin-bottom:32px;">
        <div *ngFor="let filled of pinDots"
          [style.background]="filled ? (errorShake ? '#e55a3a' : selectedStaff.color) : 'transparent'"
          [style.borderColor]="errorShake ? '#e55a3a' : 'var(--rule)'"
          style="width:16px; height:16px; border-radius:50%; border:2px solid var(--rule); transition:background 150ms, border-color 150ms;">
        </div>
      </div>

      <!-- Numpad -->
      <div style="display:grid; grid-template-columns:repeat(3,72px); gap:10px; justify-content:center;">
        <button *ngFor="let k of ['1','2','3','4','5','6','7','8','9']"
          class="key" (click)="pressKey(k)">{{ k }}</button>
        <div></div>
        <button class="key" (click)="pressKey('0')">0</button>
        <button class="key" (click)="deletePin()" style="font-size:14px; color:var(--ink-3);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12H3m0 0 6-6m-6 6 6 6"/></svg>
        </button>
      </div>

      <!-- Loading state -->
      <div *ngIf="loading" style="margin-top:20px; font-size:13px; color:var(--ink-3);">
        Verifying…
      </div>
    </div>

  </div>
</div>
